services:
    lightpanda:
        image: lightpanda/browser:nightly
        restart: unless-stopped
        ports:
            - '9222:9222'
        command:
            - /bin/lightpanda
            - serve
            - --host
            - '0.0.0.0'
            - --port
            - '9222'
            - --log-level
            - info
            - --user-agent-suffix
            - 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/135.0.0.0 Safari/537.36'
